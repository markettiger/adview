<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>광고 데이터 대시보드</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>AdView</h1>
        <nav>
          <button class="nav-btn active" data-filter="all">전체 광고 데이터</button>
          <button class="nav-btn" data-filter="meta">메타 광고 데이터</button>
          <button class="nav-btn" data-filter="apple">애플 애즈 데이터</button>
        </nav>
      </aside>

      <main class="content">
        <header>
          <h2>광고 성과 대시보드 (PC)</h2>
          <p>메타 애즈 / 애플 애즈 API 연동 기반 통합 리포트</p>
        </header>

        <section class="panel form-panel">
          <h3>API 연동 설정</h3>
          <div class="form-grid">
            <label>
              API Base URL
              <input id="apiBase" type="text" placeholder="예: https://api.your-domain.com" />
            </label>
            <label>
              메타 광고 ID
              <input id="metaAdId" type="text" placeholder="Meta Ad ID 입력" />
            </label>
            <label>
              애플 광고 ID
              <input id="appleAdId" type="text" placeholder="Apple Ads ID 입력" />
            </label>
          </div>
          <div class="button-row">
            <button id="loadBtn">데이터 불러오기</button>
            <button id="mockBtn" class="secondary">샘플 데이터 보기</button>
          </div>
          <p id="status" class="status">대기 중</p>
        </section>

        <section class="panel controls-panel">
          <h3>기간 단위</h3>
          <div class="segment">
            <button class="period-btn active" data-period="day">일간</button>
            <button class="period-btn" data-period="week">주간</button>
            <button class="period-btn" data-period="month">월간</button>
          </div>
        </section>

        <section class="panel chart-panel">
          <h3>성과 그래프 (Impressions)</h3>
          <canvas id="chart" width="980" height="320"></canvas>
        </section>

        <section class="panel table-panel">
          <h3>주요 광고 지표</h3>
          <table>
            <thead>
              <tr>
                <th>날짜</th>
                <th>플랫폼</th>
                <th>Ad ID</th>
                <th>노출수</th>
                <th>클릭수</th>
                <th>전환수</th>
                <th>비용</th>
                <th>CTR</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
